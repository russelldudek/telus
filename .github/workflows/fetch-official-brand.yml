name: Candidate campaign Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  statuses: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    if: github.actor != 'github-actions[bot]'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare browser-readable campaign package
        run: |
          rm -rf campaign
          cp -R .campaign campaign
          test -s campaign/chunk-00
          test -s campaign/chunk-05
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  verify-live:
    if: github.actor != 'github-actions[bot]'
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Verify live loader and campaign package
        env:
          SITE_URL: https://russelldudek.github.io/telus/
        run: |
          set -euo pipefail
          mkdir -p /tmp/telus-live
          curl --fail --location --retry 12 --retry-all-errors --retry-delay 5 \
            "$SITE_URL" --output /tmp/telus-live/index.html
          grep -q "new URL('campaign/', document.baseURI)" /tmp/telus-live/index.html
          for i in 00 01 02 03 04 05; do
            curl --fail --location --retry 12 --retry-all-errors --retry-delay 5 \
              "${SITE_URL}campaign/chunk-${i}" --output "/tmp/telus-live/chunk-${i}"
            test -s "/tmp/telus-live/chunk-${i}"
          done
          node <<'NODE'
          const fs = require('fs');
          const decoder = new TextDecoder();
          const parts = ['00','01','02','03','04','05']
            .map(id => fs.readFileSync(`/tmp/telus-live/chunk-${id}`, 'utf8'));
          const compressed = Uint8Array.from(
            Buffer.from(parts.join('').replace(/\s+/g, ''), 'base64')
          );
          function parseTar(bytes) {
            const result = {};
            for (let offset = 0; offset + 512 <= bytes.length;) {
              const header = bytes.subarray(offset, offset + 512);
              if (header.every(byte => byte === 0)) break;
              let name = decoder.decode(header.subarray(0, 100)).replace(/\0.*$/, '').replace(/^\.\//, '');
              const prefix = decoder.decode(header.subarray(345, 500)).replace(/\0.*$/, '');
              if (prefix) name = `${prefix}/${name}`;
              const sizeText = decoder.decode(header.subarray(124, 136)).replace(/\0.*$/, '').trim();
              const size = parseInt(sizeText || '0', 8);
              const type = String.fromCharCode(header[156] || 48);
              offset += 512;
              if ((type === '0' || type === '\0') && name) {
                result[name] = decoder.decode(bytes.subarray(offset, offset + size));
              }
              offset += Math.ceil(size / 512) * 512;
            }
            return result;
          }
          (async () => {
            const stream = new Blob([compressed]).stream().pipeThrough(new DecompressionStream('gzip'));
            const tar = new Uint8Array(await new Response(stream).arrayBuffer());
            const files = parseTar(tar);
            if (!files['index.html']?.includes('Redesign the <strong>workshare.</strong>')) {
              throw new Error('Live package does not contain the validated campaign homepage.');
            }
            if (!files['app.js'] || !files['styles.css'] || !files['resume.html']) {
              throw new Error('Live package is missing required campaign files.');
            }
            console.log(`Verified ${Object.keys(files).length} live campaign files.`);
          })().catch(error => { console.error(error); process.exit(1); });
          NODE
      - name: Publish exact-head live status
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          SOURCE_SHA: ${{ github.sha }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl --fail --location \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPOSITORY}/statuses/${SOURCE_SHA}" \
            --data "{\"state\":\"success\",\"context\":\"candidate-campaign/pages-live\",\"description\":\"Live loader and six-part campaign package verified\",\"target_url\":\"${RUN_URL}\"}"
