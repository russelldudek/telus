name: Publish TELUS Digital campaign source

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/fetch-official-brand.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reassemble verified campaign source
        shell: bash
        run: |
          set -euo pipefail
          cat .campaign/chunk-* | base64 --decode > /tmp/telus-campaign.tar.gz
          echo '3627f60349313fbf2df37fe35611a5eae5630a59d7db99cfc0b68c5f8b469669  /tmp/telus-campaign.tar.gz' | sha256sum --check
          tar -xzf /tmp/telus-campaign.tar.gz -C .
          python tests/site_qa.py
      - name: Commit candidate-facing source
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .nojekyll index.html resume.html cover-letter.html interview-brief.html 120-day-plan.html portfolio-investment-memo.html styles.css brand-tokens.css app.js README.md brand-intelligence.md sources.md artifact-manifest.json campaign-audit.md assets tests
          git diff --cached --quiet && exit 0
          git commit -m 'Publish TELUS Digital CX AI Delivery source'
          git push
