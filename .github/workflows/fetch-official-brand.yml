name: Fetch official TELUS Digital brand asset

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/fetch-official-brand.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-brand:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch official TELUS Digital header logo
        run: |
          mkdir -p assets/brand
          curl --fail --location --retry 3 \
            'https://www.telusdigital.com/_next/static/media/telus-digital-header-logo-en.3de0e2d7.svg' \
            --output assets/brand/telus-digital-logo.svg
          grep -qi '<svg' assets/brand/telus-digital-logo.svg
      - name: Commit official brand asset
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add assets/brand/telus-digital-logo.svg
          git diff --cached --quiet || git commit -m 'Add official TELUS Digital brand asset'
          git push
