name: Diagnose campaign package

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Repair identified package corruption region
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import base64
          import gzip
          import hashlib

          root = Path('.campaign')
          paths = [root / f'chunk-{i:02d}' for i in range(6)]
          parts = [path.read_text() for path in paths]
          expected = '3627f60349313fbf2df37fe35611a5eae5630a59d7db99cfc0b68c5f8b469669'

          def matches(candidate):
              try:
                  archive = base64.b64decode(candidate + ''.join(parts[1:]), validate=True)
              except Exception:
                  return False
              if hashlib.sha256(archive).hexdigest() != expected:
                  return False
              gzip.decompress(archive)
              return True

          damaged = parts[0]
          marker = damaged.find('Sp57')
          print(f'chunk-00 length={len(damaged)} marker={marker}')
          print('remote context:', repr(damaged[max(0, marker-32):marker+48]))

          replacements = [
              ('Sp57W222z6', 'Sp57V4222z6'),
              ('Sp57W2222z6', 'Sp57V4222z6'),
              ('Sp57V222z6', 'Sp57V4222z6'),
          ]
          for old, new in replacements:
              if old not in damaged:
                  continue
              candidate = damaged.replace(old, new, 1)
              print(f'testing {old!r} -> {new!r}; length={len(candidate)}')
              if matches(candidate):
                  paths[0].write_text(candidate)
                  print(f'REPAIRED {old!r} -> {new!r}')
                  print(f'chunk-00 sha256={hashlib.sha256(candidate.encode()).hexdigest()}')
                  raise SystemExit(0)
          raise SystemExit('Identified-region replacements did not recover the validated archive.')
          PY
      - name: Commit repaired package chunk
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .campaign/chunk-00
          git diff --cached --quiet && exit 0
          git commit -m 'Repair truncated campaign package chunk'
          git push origin HEAD:${{ github.head_ref }}
