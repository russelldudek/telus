name: Diagnose campaign package

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect and decode package
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          set -euxo pipefail
          git clone --depth 1 --branch "$HEAD_REF" https://github.com/${{ github.repository }}.git repo
          cd repo
          find .campaign -maxdepth 1 -type f -printf '%f %s bytes\n' | sort
          cat .campaign/chunk-* > /tmp/telus-campaign.b64
          wc -c /tmp/telus-campaign.b64
          base64 --decode /tmp/telus-campaign.b64 > /tmp/telus-campaign.tar.gz
          sha256sum /tmp/telus-campaign.tar.gz
          echo '3627f60349313fbf2df37fe35611a5eae5630a59d7db99cfc0b68c5f8b469669  /tmp/telus-campaign.tar.gz' | sha256sum --check
          tar -tzf /tmp/telus-campaign.tar.gz | sed -n '1,40p'
