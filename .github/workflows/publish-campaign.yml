name: Publish complete candidate campaign

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/publish-campaign.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Reassemble verified source package
        shell: bash
        run: |
          set -euo pipefail
          cat .campaign/chunk-* | base64 --decode > /tmp/telus-campaign.tar.gz
          echo '3627f60349313fbf2df37fe35611a5eae5630a59d7db99cfc0b68c5f8b469669  /tmp/telus-campaign.tar.gz' | sha256sum --check
          find . -mindepth 1 -maxdepth 1 ! -name .git ! -name .campaign ! -name .github -exec rm -rf {} +
          tar -xzf /tmp/telus-campaign.tar.gz -C .

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install document tooling
        run: python -m pip install --disable-pip-version-check weasyprint pypdf

      - name: Generate five committed PDFs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p docs
          weasyprint resume.html docs/Russell-Dudek-TELUS-Digital-Resume.pdf
          weasyprint cover-letter.html docs/Russell-Dudek-TELUS-Digital-Cover-Letter.pdf
          weasyprint interview-brief.html docs/Russell-Dudek-TELUS-Digital-Interview-Brief.pdf
          weasyprint 120-day-plan.html docs/Russell-Dudek-TELUS-Digital-120-Day-Plan.pdf
          weasyprint portfolio-investment-memo.html docs/Russell-Dudek-TELUS-Digital-Portfolio-Investment-Memo.pdf

      - name: Validate source, pagination, links, and confidentiality
        shell: bash
        run: |
          set -euo pipefail
          python tests/site_qa.py
          python - <<'PY'
          from pathlib import Path
          from pypdf import PdfReader
          import re

          root = Path('.')
          expected = {
              'Russell-Dudek-TELUS-Digital-Resume.pdf': 2,
              'Russell-Dudek-TELUS-Digital-Cover-Letter.pdf': 1,
              'Russell-Dudek-TELUS-Digital-Interview-Brief.pdf': 4,
              'Russell-Dudek-TELUS-Digital-120-Day-Plan.pdf': 2,
              'Russell-Dudek-TELUS-Digital-Portfolio-Investment-Memo.pdf': 1,
          }
          forbidden = re.compile(r'role\s*[-_ ]?forge', re.I)
          contact = ['412.287.8640', 'russelldudek@gmail.com', 'linkedin.com/in/russelldudek']
          for name, pages in expected.items():
              path = root / 'docs' / name
              assert path.read_bytes()[:4] == b'%PDF', f'Invalid PDF signature: {name}'
              reader = PdfReader(path)
              assert len(reader.pages) == pages, f'{name}: expected {pages} pages, got {len(reader.pages)}'
              text = '\n'.join(page.extract_text() or '' for page in reader.pages)
              assert not forbidden.search(text), f'Forbidden internal label in {name}'
              assert all(value in text for value in contact), f'Missing verified contact information in {name}'
          print('PDF QA passed')
          PY

      - name: Replace bootstrap with clean public tree
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .campaign
          rm -f .github/workflows/publish-campaign.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m 'Publish TELUS Digital CX AI Delivery campaign'
          git push
